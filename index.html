<!DOCTYPE html>
<html>
<body>
<script>
const data = {
    content: "Hello from GitHub Pages!"
};

const blob = new Blob(
    [JSON.stringify(data)],
    { type: "application/json" }
);

const success = navigator.sendBeacon(
    "https://discord.com/api/webhooks/你的Webhook",
    blob
);

console.log("Beacon queued:", success);

window.close();
</script>
</body>
</html>
